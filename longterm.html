<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long-Term Market Summary · Oblique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f6f8;
      --card:        #ffffff;
      --border:      #dde3ea;
      --text:        #1a2533;
      --text-muted:  #6b7a8d;
      --hinder-blue: #003a5c;
      --hinder-teal: #005f87;
      --oblique-red: #E04822;
      --green:       #2e7d4f;
      --red:         #c0392b;
      --col-stock:   #003a5c;
      --col-bond:    #5a3e9a;
      --na:          #bbb;
    }

    body {
      background: var(--bg);
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      padding: 32px 24px 60px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      max-width: 960px;
      margin: 0 auto 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-left h1 {
      font-size: 28px;
      font-weight: 300;
      color: var(--hinder-blue);
      line-height: 1.15;
    }
    .header-left h1 strong { font-weight: 700; }
    .header-left .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
    .logo a {
      font-family: 'Nunito', sans-serif;
      font-size: 32px; font-weight: 600;
      color: var(--oblique-red);
      text-decoration: none; letter-spacing: -.5px;
    }
    .logo a:hover { opacity: .8; }

    /* ── Nav ─────────────────────────────────────────────────── */
    .nav {
      max-width: 960px;
      margin: 0 auto 16px;
      display: flex;
      gap: 8px;
    }
    .nav a {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      color: var(--text-muted);
      background: var(--card);
    }
    .nav a.active {
      background: var(--hinder-blue);
      color: #fff;
      border-color: var(--hinder-blue);
    }
    .nav a:hover:not(.active) { background: #e8f0f6; }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      max-width: 960px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,58,92,.06);
    }

    /* ── Table ───────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    /* group header row (Stocks / Bonds) */
    .group-row th {
      padding: 10px 16px 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fff;
      border-bottom: 2px solid rgba(255,255,255,.2);
    }
    .group-row th.label-cell {
      background: var(--hinder-blue);
    }
    .group-row th.stocks { background: var(--col-stock); }
    .group-row th.bonds  { background: var(--col-bond);  }

    /* divider between stocks and bonds */
    .divider-col { width: 2px; background: #e0e8f0; }

    /* column header row */
    .col-header th {
      padding: 8px 12px 10px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.15);
      line-height: 1.3;
    }
    .col-header th.label-cell {
      background: var(--hinder-blue);
      text-align: left;
      font-size: 10.5px;
      color: rgba(255,255,255,.6);
    }
    .col-header th.stocks { background: var(--col-stock); }
    .col-header th.bonds  { background: var(--col-bond);  }
    .col-header th.divider-col { background: #e0e8f0; }

    /* data rows */
    .data-row td {
      padding: 14px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-row:last-child td { border-bottom: none; }
    .data-row:hover td { background: #f6f9fb; }

    .data-row td.label-cell {
      text-align: left;
      padding-left: 20px;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
    }
    .data-row td.divider-col {
      background: #e8f0f6;
      padding: 0;
    }

    /* value cell */
    .val {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .val .pct {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.3px;
    }
    .val .pct.pos { color: var(--green); }
    .val .pct.neg { color: var(--red);   }
    .val .arrow { font-size: 13px; }
    .val .arrow.pos { color: var(--green); }
    .val .arrow.neg { color: var(--red);   }
    .val.na { color: var(--na); font-size: 18px; font-weight: 300; }

    /* ── World Market Cap ────────────────────────────────────── */
    .mktcap-card {
      max-width: 960px;
      margin: 0 auto 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 24px 20px;
      box-shadow: 0 2px 12px rgba(0,58,92,.06);
    }
    .mktcap-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--hinder-blue);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .mktcap-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      margin-bottom: 16px;
    }
    .mktcap-body {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* Donut via SVG */
    .donut-wrap {
      position: relative;
      flex-shrink: 0;
      width: 150px;
      height: 150px;
    }
    .donut-wrap svg { display: block; }
    .donut-wrap svg path {
      transition: opacity .15s;
      cursor: pointer;
    }
    .donut-wrap svg path:hover { opacity: .78; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--hinder-teal);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .back-btn:hover { background: #daeaf5; }

    /* Legend */
    .mktcap-legend {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }
    .mktcap-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .mktcap-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-top: 3px;
      flex-shrink: 0;
    }
    .mktcap-pct {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .mktcap-name {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      margin-top: 2px;
    }
    .mktcap-val {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── MAG7 ───────────────────────────────────────────────── */
    .mag7-block {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .mag7-body {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      max-width: 960px;
      margin: 16px auto 0;
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .footer code { font-size: 10px; background: #eef2f5; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Long-Term Market Summary<br><strong>Annualised Returns in Swiss Francs</strong></h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div class="logo"><a href="https://oblique.swiss" target="_blank" rel="noopener"><i>O</i>blique</a></div>
</div>

<div class="nav">
  <a href="index.html">YTD Dashboard</a>
  <a href="longterm.html" class="active">Long-Term Summary</a>
  <a href="hyperscaler-capex.html">Hyperscaler Capex</a>
</div>

<!-- ── World Market Capitalisation (rendered by JS from live_data.js) ──── -->
<div class="mktcap-card" id="mktcap-card" style="display:none">
  <div class="mktcap-title">World Market Capitalisation</div>
  <div class="mktcap-date" id="mktcap-date"></div>
  <div id="mktcap-back-wrap" style="display:none">
    <button class="back-btn" onclick="renderWorldLevel1()">← Back</button>
  </div>
  <div class="mktcap-body">
    <div class="donut-wrap">
      <svg id="mktcap-svg" width="150" height="150" viewBox="0 0 150 150"></svg>
    </div>
    <div class="mktcap-legend" id="mktcap-legend"></div>
  </div>
  <div class="mag7-block" id="mag7-block" style="display:none">
    <div class="mktcap-title">Magnificent 7 + SpaceX — Free Float Market Cap</div>
    <div class="mktcap-date" id="mag7-date"></div>
    <div class="mag7-body">
      <div class="donut-wrap">
        <svg id="mag7-svg" width="150" height="150" viewBox="0 0 150 150"></svg>
      </div>
      <div class="mktcap-legend" id="mag7-legend"></div>
    </div>
  </div>
</div>

<div class="card">
  <table id="lt-table">
    <tr><td colspan="9" style="padding:20px;color:var(--text-muted);font-size:13px;">
      Loading data… make sure <code>live_data.js</code> exists
      (run <code>python3 fetch_data.py</code> then reload).
    </td></tr>
  </table>
</div>

<div class="footer" id="footer"></div>

<script>document.write('<script src="live_data.js?' + Date.now() + '" onerror="window.LIVE_DATA=null"><\/script>');</script>
<script>
(function () {
  const LD = (typeof LIVE_DATA !== "undefined") ? LIVE_DATA : null;

  // ── Subtitle & footer ──────────────────────────────────────
  document.getElementById("subtitle").textContent = LD
    ? "As of " + LD.fetchedAt + "  ·  Source: Yahoo Finance (ETF proxies, USD→CHF)"
    : "⚠ No data — run: python3 fetch_data.py";

  const PERIODS = [1, 5, 10, 15, 20];

  if (!LD || !LD.longTermMarkets) {
    document.getElementById("footer").innerHTML =
      "Run <code>python3 fetch_data.py</code> to generate live_data.js, then reload.";
    return;
  }

  const markets = LD.longTermMarkets;
  const stocks  = markets.filter(m => m.group === "Stocks");
  const bonds   = markets.filter(m => m.group === "Bonds");

  // ── Cell builder ──────────────────────────────────────────
  function valCell(ret, cls) {
    if (ret === null || ret === undefined) {
      return `<td class="${cls}"><div class="val na">—</div></td>`;
    }
    const pos   = ret >= 0;
    const sign  = pos ? "+" : "";
    const pcls  = pos ? "pos" : "neg";
    const arrow = pos ? "▲" : "▼";
    return `<td class="${cls}">
      <div class="val">
        <span class="pct ${pcls}">${sign}${ret.toFixed(2)}%</span>
        <span class="arrow ${pcls}">${arrow}</span>
      </div>
    </td>`;
  }

  // ── Build table ───────────────────────────────────────────
  const nStocks = stocks.length;
  const nBonds  = bonds.length;

  // Group header row
  let html = `
    <colgroup>
      <col style="width:100px">
      ${stocks.map(() => '<col>').join('')}
      <col class="divider-col" style="width:6px">
      ${bonds.map(() => '<col>').join('')}
    </colgroup>
    <thead>
      <tr class="group-row">
        <th class="label-cell" rowspan="2"></th>
        <th class="stocks" colspan="${nStocks}">Stocks</th>
        <th class="divider-col" rowspan="2" style="background:#e0e8f0"></th>
        <th class="bonds" colspan="${nBonds}">Bonds</th>
      </tr>
      <tr class="col-header">`;

  stocks.forEach(m => {
    html += `<th class="stocks" title="${m.index}">${m.name}<br>
      <span style="font-size:9px;opacity:.65;font-weight:400">${m.ticker}</span></th>`;
  });
  // ↑ No divider cell here — already covered by rowspan="2" in the group-row above
  bonds.forEach(m => {
    html += `<th class="bonds" title="${m.index}">${m.name}<br>
      <span style="font-size:9px;opacity:.65;font-weight:400">${m.ticker}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  // Data rows — derive the end date from actual data
  const endDate = LD.longTermMarkets
    .flatMap(m => Object.values(m.returns))
    .some(v => v !== null) ? LD.fetchedAt.split(" ")[0] : "—";

  const labels = {1:"1 Year", 5:"5 Years", 10:"10 Years", 15:"15 Years", 20:"20 Years"};
  const approxStart = {
    1:  (new Date().getFullYear()-1).toString(),
    5:  (new Date().getFullYear()-5).toString(),
    10: (new Date().getFullYear()-10).toString(),
    15: (new Date().getFullYear()-15).toString(),
    20: (new Date().getFullYear()-20).toString(),
  };
  PERIODS.forEach(y => {
    html += `<tr class="data-row">
      <td class="label-cell">
        ${labels[y]}
        <div style="font-size:9.5px;color:var(--text-muted);font-weight:400;margin-top:1px;">
          ${approxStart[y]} – ${endDate}
        </div>
      </td>`;
    stocks.forEach(m => {
      html += valCell(m.returns[String(y)], "stocks-cell");
    });
    html += `<td class="divider-col"></td>`;
    bonds.forEach(m => {
      html += valCell(m.returns[String(y)], "bonds-cell");
    });
    html += `</tr>`;
  });

  html += `</tbody>`;
  document.getElementById("lt-table").innerHTML = html;

  // ── Footer ────────────────────────────────────────────────
  const indexLines = markets.map(m =>
    `<b>${m.name}</b>: ${m.index} (${m.ticker})`
  ).join("&ensp;·&ensp;");

  document.getElementById("footer").innerHTML =
    `Past performance is not a guarantee of future results. Indices are not available for direct investment.<br>
    All returns annualised in CHF to last completed month-end (${LD.fetchedAt.split(" ")[0]}).
    USD/EUR/GBP converted via Yahoo Finance spot rates. — = insufficient ETF history (&lt;95% of period).<br>
    <b>Note:</b> Returns measured to ${LD.fetchedAt.split(" ")[0]} include 2026 YTD performance and will differ
    from sources using a Dec 2025 end date.<br>
    ${indexLines}<br>
    Data: Yahoo Finance (UCITS ETFs, Irish/Swiss domicile) · Feed: ${LD.fetchedAt} · Source: Oblique<br>
    <b>World Market Cap:</b> US baseline = Russell 3000 total market cap ($${LD.worldMktCap?.regions[0]?.trillions.toFixed(1)}T at ${LD.worldMktCap?.baseline}), scaled forward via SPY ETF performance.
    International Developed &amp; Emerging Markets scaled via EFA / EEM.`;
  // ── MAG7 ──────────────────────────────────────────────────
  const MAG7_COLORS = {
    Apple:     "#555555",
    Microsoft: "#00a1f1",
    Nvidia:    "#76b900",
    Amazon:    "#ff9900",
    Alphabet:  "#4285f4",
    Meta:      "#0668e1",
    Tesla:     "#e82127",
    SpaceX:    "#005288",
  };

  if (LD?.mag7) {
    const m      = LD.mag7;
    const sorted = [...m.stocks].sort((a, b) => b.trillions - a.trillions);
    const total  = m.totalT;

    document.getElementById('mag7-block').style.display = '';
    document.getElementById('mag7-date').textContent =
      `Free float market caps · ${m.worldPct}% of world market · ${m.usPct}% of US market`;

    const segs = sorted.map(s => ({
      name:      s.name,
      pct:       s.trillions / total * 100,
      color:     MAG7_COLORS[s.name] || '#aaa',
      trillions: s.trillions,
      freeFloat: s.freeFloat,
      totalT:    s.totalT,
    }));

    renderDonut('mag7-svg', 'mag7-legend', segs,
      [[`$${total.toFixed(1)}T`, 13, 700, '#1a2533'], ['Float cap', 9, 400, '#6b7a8d']],
      function() {}
    );

    // Override legend to add free-float note for SpaceX
    document.getElementById('mag7-legend').innerHTML = segs.map(s => {
      const color  = s.color;
      const pct    = (s.pct).toFixed(1);
      const ffNote = s.freeFloat < 20
        ? `<div class="mktcap-val" style="color:#c0392b;">${s.freeFloat}% free float · total $${s.totalT.toFixed(1)}T</div>`
        : '';
      return `
        <div class="mktcap-item">
          <div class="mktcap-swatch" style="background:${color}"></div>
          <div class="mktcap-info">
            <div class="mktcap-pct" style="color:${color};font-size:16px;">${pct}%</div>
            <div class="mktcap-name">${s.name}</div>
            <div class="mktcap-val">$${s.trillions.toFixed(2)}T float cap</div>
            ${ffNote}
          </div>
        </div>`;
    }).join('');
  }

  // ── World Market Cap ──────────────────────────────────────
  const DRILLDOWN = {
    "US Market": {
      title: "US Market · S&P 500 Sectors",
      segments: [
        { name: "Information Technology", pct: 31.0, color: "#003a5c" },
        { name: "Financials",             pct: 13.5, color: "#1a5c80" },
        { name: "Healthcare",             pct: 11.5, color: "#347da3" },
        { name: "Consumer Discret.",      pct: 10.5, color: "#4e9ec6" },
        { name: "Comm. Services",         pct:  9.0, color: "#68bfe9" },
        { name: "Industrials",            pct:  8.5, color: "#82c8dc" },
        { name: "Consumer Staples",       pct:  5.5, color: "#9cd1cf" },
        { name: "Energy",                 pct:  3.5, color: "#b6dac2" },
        { name: "Other",                  pct:  7.0, color: "#c8e3d5" },
      ],
    },
    "International Developed": {
      title: "International Developed · MSCI EAFE Countries",
      segments: [
        { name: "Japan",        flag: "🇯🇵", pct: 22.5, color: "#8a6400" },
        { name: "UK",           flag: "🇬🇧", pct: 14.2, color: "#a07820" },
        { name: "France",       flag: "🇫🇷", pct: 11.1, color: "#b68c3a" },
        { name: "Switzerland",  flag: "🇨🇭", pct:  8.8, color: "#c8a050" },
        { name: "Germany",      flag: "🇩🇪", pct:  7.2, color: "#d4b468" },
        { name: "Australia",    flag: "🇦🇺", pct:  7.0, color: "#e0c880" },
        { name: "Netherlands",  flag: "🇳🇱", pct:  4.9, color: "#ecda98" },
        { name: "Sweden",       flag: "🇸🇪", pct:  3.2, color: "#f4e8b0" },
        { name: "Denmark",      flag: "🇩🇰", pct:  2.8, color: "#f8f0c8" },
        { name: "Others",                    pct: 18.3, color: "#c0a060" },
      ],
    },
    "Emerging Markets": {
      title: "Emerging Markets · BGF EM Fund, May 2026",
      segments: [
        { name: "Taiwan",       flag: "🇹🇼", pct: 26.52, color: "#2a6010" },
        { name: "Korea",        flag: "🇰🇷", pct: 23.17, color: "#3e7424" },
        { name: "China",        flag: "🇨🇳", pct: 20.16, color: "#528838" },
        { name: "India",        flag: "🇮🇳", pct: 10.73, color: "#669c4c" },
        { name: "Others",                    pct:  7.97, color: "#76a856" },
        { name: "South Africa", flag: "🇿🇦", pct:  3.05, color: "#8ec474" },
        { name: "Brazil",       flag: "🇧🇷", pct:  2.43, color: "#a2d488" },
        { name: "Saudi Arabia", flag: "🇸🇦", pct:  1.84, color: "#b6e49c" },
        { name: "Mexico",       flag: "🇲🇽", pct:  1.67, color: "#c6f0ac" },
        { name: "Germany",      flag: "🇩🇪", pct:  1.41, color: "#d0f4bc" },
        { name: "UAE",          flag: "🇦🇪", pct:  1.07, color: "#e0f8cc" },
      ],
    },
  };

  function polarToCart(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }

  function arcPath(cx, cy, R, ri, a1, a2) {
    const [x1,y1] = polarToCart(cx, cy, R,  a1);
    const [x2,y2] = polarToCart(cx, cy, R,  a2);
    const [x3,y3] = polarToCart(cx, cy, ri, a2);
    const [x4,y4] = polarToCart(cx, cy, ri, a1);
    const lg = (a2 - a1) > 180 ? 1 : 0;
    return `M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 ${lg} 0 ${x4},${y4} Z`;
  }

  function renderDonut(svgId, legendId, segments, centerLines, onClickFn) {
    const svg    = document.getElementById(svgId);
    const legend = document.getElementById(legendId);
    const cx = 75, cy = 75, R = 70, ri = 44;
    const total  = segments.reduce((s, x) => s + x.pct, 0);
    let angle    = 0, paths = '', legendHtml = '';

    segments.forEach((seg, i) => {
      const sweep    = seg.pct / total * 360;
      const a2       = angle + sweep - 0.4;
      const clickArg = seg.clickArg !== undefined ? seg.clickArg : i;
      paths += `<path d="${arcPath(cx,cy,R,ri,angle,a2)}" fill="${seg.color}"
        onclick="(${onClickFn.toString()})(${clickArg})"
        title="${(seg.flag||'')+seg.name}: ${(seg.pct/total*100).toFixed(1)}%"></path>`;
      angle += sweep;

      legendHtml += `
        <div class="mktcap-item" style="cursor:${onClickFn ? 'pointer' : 'default'}"
             onclick="(${onClickFn.toString()})(${clickArg})">
          <div class="mktcap-swatch" style="background:${seg.color}"></div>
          <div class="mktcap-info">
            <div class="mktcap-pct" style="color:${seg.color}">${(seg.pct/total*100).toFixed(0)}%</div>
            <div class="mktcap-name">${(seg.flag||'')} ${seg.name}</div>
            ${seg.trillions != null ? `<div class="mktcap-val">$${seg.trillions.toFixed(1)}T</div>` : ''}
          </div>
        </div>`;
    });

    // Center text
    centerLines.forEach(([text, size, weight, color], i) => {
      paths += `<text x="75" y="${66 + i*17}" text-anchor="middle"
        font-family="Helvetica Neue,Arial,sans-serif"
        font-size="${size}" font-weight="${weight}" fill="${color}">${text}</text>`;
    });

    svg.innerHTML = paths;
    legend.innerHTML = legendHtml;
  }

  function renderWorldLevel1() {
    const wmc     = LD.worldMktCap;
    const backWrap = document.getElementById('mktcap-back-wrap');
    backWrap.style.display = 'none';
    document.getElementById('mktcap-date').textContent =
      `Baseline: ${wmc.baseline} · Scaled to ${wmc.updatedTo} via ETF performance · Click a segment to drill down`;

    const segs = wmc.regions.map(r => ({ ...r, pct: r.pct }));
    renderDonut('mktcap-svg', 'mktcap-legend', segs,
      [[`$${wmc.totalT}T`, 13, 700, '#1a2533'], ['Total', 9, 400, '#6b7a8d']],
      function(i) { renderWorldDrilldown(i); }
    );

    // ── Mag7+SpaceX hatch overlay inside US segment ──────────
    if (LD.mag7) {
      const svg    = document.getElementById('mktcap-svg');
      const cx = 75, cy = 75, R = 70, ri = 44;
      const mag7T  = LD.mag7.totalT;
      const mag7Sweep = mag7T / wmc.totalT * 360;
      const hatchPath = arcPath(cx, cy, R, ri, 0, mag7Sweep - 0.4);

      // Use proper SVG DOM API (Safari/iOS requires correct namespacing)
      const NS = 'http://www.w3.org/2000/svg';
      const defs    = document.createElementNS(NS, 'defs');
      const pattern = document.createElementNS(NS, 'pattern');
      pattern.setAttribute('id', 'mag7-hatch');
      pattern.setAttribute('patternUnits', 'userSpaceOnUse');
      pattern.setAttribute('width', '6');
      pattern.setAttribute('height', '6');
      pattern.setAttribute('patternTransform', 'rotate(45 75 75)');
      const line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', '0'); line.setAttribute('y1', '0');
      line.setAttribute('x2', '0'); line.setAttribute('y2', '6');
      line.setAttribute('stroke', 'rgba(255,255,255,0.5)');
      line.setAttribute('stroke-width', '2.5');
      pattern.appendChild(line);
      defs.appendChild(pattern);
      svg.appendChild(defs);

      const pathEl = document.createElementNS(NS, 'path');
      pathEl.setAttribute('d', hatchPath);
      pathEl.setAttribute('fill', 'url(#mag7-hatch)');
      pathEl.setAttribute('pointer-events', 'none');
      svg.appendChild(pathEl);

      // Insert Mag7+SpaceX legend entry after US Market
      const mag7Pct  = Math.round(mag7T / wmc.totalT * 100);
      const legend   = document.getElementById('mktcap-legend');
      const usItem   = legend.querySelector('.mktcap-item');
      usItem.insertAdjacentHTML('afterend', `
        <div class="mktcap-item" style="cursor:default">
          <div class="mktcap-swatch" style="background:#003a5c;
            background-image:repeating-linear-gradient(45deg,
              rgba(255,255,255,0.5) 0px, rgba(255,255,255,0.5) 2px,
              transparent 2px, transparent 6px);"></div>
          <div class="mktcap-info">
            <div class="mktcap-pct" style="color:#003a5c">${mag7Pct}%</div>
            <div class="mktcap-name">Mag 7 + SpaceX</div>
            <div class="mktcap-val">$${mag7T.toFixed(1)}T</div>
          </div>
        </div>`);
    }
  }
  window.renderWorldLevel1 = renderWorldLevel1;

  function renderWorldDrilldown(i) {
    const wmc      = LD.worldMktCap;
    const region   = wmc.regions[i];
    const drill    = DRILLDOWN[region.name];
    if (!drill) return;

    document.getElementById('mktcap-back-wrap').style.display = '';
    document.getElementById('mktcap-date').textContent =
      `${drill.title} · MSCI index weights (static)`;

    const totalT = region.trillions;
    const segs   = drill.segments.map(s => ({
      ...s,
      trillions: +(totalT * s.pct / 100).toFixed(1),
    }));

    renderDonut('mktcap-svg', 'mktcap-legend', segs,
      [[`$${totalT.toFixed(1)}T`, 13, 700, '#1a2533'],
       [region.name.split(' ')[0], 8, 400, '#6b7a8d']],
      function() {}
    );
  }
  window.renderWorldDrilldown = renderWorldDrilldown;

  if (LD?.worldMktCap) {
    document.getElementById('mktcap-card').style.display = '';
    renderWorldLevel1();
  }

})();
</script>
</body>
</html>
